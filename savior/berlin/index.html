<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@savior</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;900&display=swap');

        :root {
            --pure-black: #000000;
            --deep-gray: #080808;
            --border: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-dim: #444444;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--pure-black);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .dashboard {
            display: grid;
            grid-template-columns: 320px 400px;
            grid-template-rows: auto auto;
            gap: 15px;
            width: 95%;
            max-width: 750px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background: var(--deep-gray);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }

        .profile-main {
            grid-row: span 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            justify-content: space-between; 
            padding-bottom: 30px;
        }

        #discord-avatar {
            width: 120px;
            height: 120px;
            border-radius: 30px;
            border: 1px solid var(--border);
            margin-top: 10px;
        }

        .name-box h1 { font-size: 1.8rem; font-weight: 900; letter-spacing: -1px; margin-top: 15px; }
        .name-box p { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; margin-top: 5px; }

        .actions {
            margin-top: auto; 
            display: flex;
            gap: 25px;
            justify-content: center;
            align-items: center;
            padding-top: 20px;
        }

        .actions a {
            color: #222; 
            font-size: 1.3rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .actions a:hover {
            color: #fff;
            transform: scale(1.25);
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.4));
        }

        .activity-card {
            display: flex;
            align-items: center;
            gap: 15px;
            min-height: 110px;
        }

        .activity-icon {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            object-fit: cover;
            background: #111;
        }

        .activity-info h4 { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
        .activity-info h2 { font-size: 0.95rem; font-weight: 700; }
        .activity-info p { font-size: 0.75rem; color: #666; }

        .spotify-bar-container {
            width: 100%;
            height: 2px;
            background: #151515;
            margin-top: 15px;
            border-radius: 2px;
        }
        #spotify-fill { height: 100%; background: #fff; width: 0%; border-radius: 2px; transition: width 1s linear; }

        .status-footer {
            grid-column: span 2;
            text-align: center;
            font-size: 0.75rem;
            color: #1a1a1a;
            margin-top: 10px;
        }

        .status-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
        .online { background: #fff; box-shadow: 0 0 8px #fff; }
        .idle { background: #333; }
        .dnd { background: #111; border: 1px solid #fff; }
        .offline { background: #050505; }

        @media (max-width: 600px) {
            .dashboard { grid-template-columns: 1fr; height: auto; padding: 20px; }
            body { overflow-y: auto; }
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="card profile-main">
            <div class="top-content">
                <img id="discord-avatar" src="" alt="Avatar">
                <div class="name-box">
                    <h1 id="username">Identity</h1>
                    <p>Not Really</p>
                </div>
            </div>
            
            <div class="actions">
                <a href="https://discord.com/users/1025824752868278301" target="_blank"><i class="fab fa-discord"></i></a>
                <a href="https://steamcommunity.com/id/berlxn" target="_blank"><i class="fab fa-steam"></i></a>
                <a href="https://instagram.com/berlinxrf" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
        </div>

        <div class="card activity-card" id="game-card">
            <img id="game-icon" class="activity-icon" src="https://via.placeholder.com/60/000?text=?" alt="">
            <div class="activity-info">
                <h4>Currently Playing</h4>
                <h2 id="game-name">No Game</h2>
                <p id="game-detail">Status: Idle</p>
            </div>
        </div>

        <div class="card" style="display: flex; flex-direction: column; justify-content: center;">
            <div class="activity-card" style="padding: 0; border: none; background: none; min-height: auto;">
                <img id="track-art" class="activity-icon" src="https://via.placeholder.com/60/000?text=." alt="">
                <div class="activity-info">
                    <h4>On Repeat</h4>
                    <h2 id="track-name">Currently Playing Nothing...</h2>
                    <p id="track-artist">Spotify Offline</p>
                </div>
            </div>
            <div class="spotify-bar-container">
                <div id="spotify-fill"></div>
            </div>
        </div>

        <div class="status-footer">
            <span id="status-dot" class="status-dot"></span>
            <span id="custom-status">Initializing...</span>
        </div>
    </div>

    <script>
        const DISCORD_ID = "696451691377328139"; 

        async function updateData() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data } = await response.json();
                const user = data.discord_user;

                const ext = user.avatar.startsWith("a_") ? ".gif" : ".png";
                document.getElementById('discord-avatar').src = `https://cdn.discordapp.com/avatars/${DISCORD_ID}/${user.avatar}${ext}?size=512`;

                document.getElementById('username').innerText = user.global_name || user.username;
                document.getElementById('status-dot').className = `status-dot ${data.discord_status}`;
                
                const custom = data.activities.find(a => a.type === 4);
                document.getElementById('custom-status').innerText = custom ? custom.state : "";

                const game = data.activities.find(a => a.type === 0);
                if (game) {
                    document.getElementById('game-name').innerText = game.name;
                    document.getElementById('game-detail').innerText = game.details || "Active";
                    if(game.assets && game.assets.large_image) {
                        const appId = game.application_id;
                        const assetId = game.assets.large_image;
                        document.getElementById('game-icon').src = assetId.includes("external") 
                            ? `https://media.discordapp.net/external/${assetId.split("mp:external/")[1]}`
                            : `https://cdn.discordapp.com/app-assets/${appId}/${assetId}.png`;
                    }
                    document.getElementById('game-card').style.opacity = "1";
                } else {
                    document.getElementById('game-name').innerText = "Not Active";
                    document.getElementById('game-detail').innerText = "Offline Mode";
                    document.getElementById('game-icon').src = "https://via.placeholder.com/60/000?text=X";
                    document.getElementById('game-card').style.opacity = "0.3";
                }

                if (data.listening_to_spotify) {
                    const s = data.spotify;
                    document.getElementById('track-name').innerText = s.song;
                    document.getElementById('track-artist').innerText = s.artist;
                    document.getElementById('track-art').src = s.album_art_url;
                    const p = ((Date.now() - s.timestamps.start) / (s.timestamps.end - s.timestamps.start)) * 100;
                    document.getElementById('spotify-fill').style.width = Math.min(p, 100) + "%";
                } else {
                    document.getElementById('track-name').innerText = "Currently Playing Nothing...";
                    document.getElementById('track-artist').innerText = "-";
                    document.getElementById('spotify-fill').style.width = "0%";
                }
            } catch (err) { console.log(err); }
        }

        setInterval(updateData, 2000);
        updateData();
    </script>
</body>
</html>
